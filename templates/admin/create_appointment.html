{% extends "base.html" %}
{% block title %}Create Appointment – MubyeyiCare{% endblock %}

{% block content %}
<div class="page-header" data-aos="fade-down">
    <h2><i class="fas fa-calendar-plus me-2"></i> Create Appointment</h2>
    <a href="{{ url_for('admin.appointments') }}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left me-1"></i> Back
    </a>
</div>

<div class="row justify-content-center">
<div class="col-12 col-lg-8">
<div class="card" data-aos="fade-up">
    <div class="card-header">
        <i class="fas fa-calendar-check me-2 text-primary"></i> Appointment Details
    </div>
    <div class="card-body">
        <form method="POST">
            <!-- Patient -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Patient <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user-injured"></i></span>
                    <select name="patient_id" class="form-select" required>
                        <option value="">— Select patient —</option>
                        {% for p in patients %}
                        <option value="{{ p.id }}">{{ p.get_full_name() }} (MRN: {{ p.mrn }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <!-- Preferred Date -->
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Preferred Date &amp; Time <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-calendar"></i></span>
                        <input type="datetime-local" name="preferred_date" class="form-control" required>
                    </div>
                </div>
                <!-- Scheduled Date -->
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Confirmed Date &amp; Time
                        <small class="text-muted fw-normal">(optional)</small>
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-calendar-check"></i></span>
                        <input type="datetime-local" name="scheduled_date" class="form-control">
                    </div>
                    <div class="form-text">Leave blank to use preferred date as the confirmed time.</div>
                </div>
            </div>

            <!-- Reason -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Reason / Notes</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-notes-medical"></i></span>
                    <textarea name="reason" class="form-control" rows="2"
                              placeholder="Brief reason for the appointment…"></textarea>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <!-- Assign HCP -->
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Assign HCP</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user-doctor"></i></span>
                        <select name="hcp_id" class="form-select">
                            <option value="">— Unassigned —</option>
                            {% for h in hcps %}
                            <option value="{{ h.id }}">{{ h.get_full_name() }} ({{ h.role.value }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <!-- Status -->
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Status</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-tag"></i></span>
                        <select name="status" class="form-select">
                            {% for s in statuses %}
                            <option value="{{ s.value }}" {{ 'selected' if s.value == 'approved' }}>
                                {{ s.value.capitalize() }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <!-- Admin Notes -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Admin Notes</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-sticky-note"></i></span>
                    <textarea name="admin_notes" class="form-control" rows="2"
                              placeholder="Internal notes visible to staff…"></textarea>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i> Create Appointment
                </button>
                <a href="{{ url_for('admin.appointments') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
