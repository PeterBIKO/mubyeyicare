{% extends "base.html" %}

{% block title %}Edit Follow-up - MubyeyiCare{% endblock %}

{% block content %}
<div class="page-header" data-aos="fade-down">
    <h2><i class="fas fa-calendar-pen me-2"></i> Edit Follow-up</h2>
    <a href="{{ url_for('follow_ups.view_follow_up', follow_up_id=follow_up.id) }}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left me-1"></i> Back
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7" data-aos="fade-up">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <i class="fas fa-user me-2"></i> {{ patient.get_full_name() }}
                <small class="text-white-50 ms-2">— {{ patient.mrn }}</small>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('follow_ups.edit_follow_up', follow_up_id=follow_up.id) }}">

                    <p class="section-title">Schedule Details</p>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="follow_up_date" class="form-label">Follow-up Date <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-calendar"></i></span>
                                <input type="date" class="form-control" id="follow_up_date" name="follow_up_date"
                                       value="{{ follow_up.follow_up_date.strftime('%Y-%m-%d') }}" required>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="follow_up_time" class="form-label">Time <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-clock"></i></span>
                                <input type="time" class="form-control" id="follow_up_time" name="follow_up_time"
                                       value="{{ follow_up.follow_up_date.strftime('%H:%M') }}" required>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="follow_up_type" class="form-label">Follow-up Type <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-stethoscope"></i></span>
                                <select class="form-select" id="follow_up_type" name="follow_up_type"
                                        style="border-left:none;" required>
                                    <option value="">— Select Type —</option>
                                    {% for opt in ['In-person', 'Telemedicine', 'Phone'] %}
                                    <option value="{{ opt }}" {{ 'selected' if follow_up.follow_up_type == opt }}>
                                        {{ opt }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="visit_location" class="form-label">Visit Location</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-location-dot"></i></span>
                                <input type="text" class="form-control" id="visit_location" name="visit_location"
                                       value="{{ follow_up.visit_location or '' }}"
                                       placeholder="e.g., OPD, Home, Clinic">
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="4"
                                  placeholder="Additional notes for this follow-up…">{{ follow_up.notes or '' }}</textarea>
                    </div>

                    <hr class="my-3">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="fas fa-save me-1"></i> Save Changes
                        </button>
                        <a href="{{ url_for('follow_ups.view_follow_up', follow_up_id=follow_up.id) }}"
                           class="btn btn-outline-secondary">
                            <i class="fas fa-times me-1"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
