{% extends "base.html" %}

{% block title %}Link Patient Record - Post-Cesarean Wound Care System{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-link"></i> Link Patient Record</h4>
            </div>
            <div class="card-body">
                <p class="mb-4">Enter your patient MRN, email, or phone to link this account to an existing patient profile.</p>
                <form method="POST" action="{{ url_for('auth.link_patient') }}">
                    <div class="mb-3">
                        <label for="mrn" class="form-label">MRN</label>
                        <input type="text" class="form-control" id="mrn" name="mrn" placeholder="Medical Record Number">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Patient email address">
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone</label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="Patient phone number">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Link Patient Record
                        </button>
                        <a href="{{ url_for('auth.profile') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
