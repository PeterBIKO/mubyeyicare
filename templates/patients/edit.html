{% extends "base.html" %}

{% block title %}Edit Patient - Post-Cesarean Wound Care System{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-edit"></i> Edit Patient - {{ patient.get_full_name() }}</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('patients.edit_patient', patient_id=patient.id) }}">
                    <h6 class="mb-3">Personal Information</h6>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="first_name" name="first_name" value="{{ patient.first_name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="last_name" name="last_name" value="{{ patient.last_name }}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="phone" name="phone" value="{{ patient.phone }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ patient.email or '' }}">
                        </div>
                    </div>

                    <hr>
                    <h6 class="mb-3">Surgery Information</h6>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="surgery_type" class="form-label">Surgery Type</label>
                            <input type="text" class="form-control" id="surgery_type" name="surgery_type" value="{{ patient.surgery_type or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="surgeon_name" class="form-label">Surgeon Name</label>
                            <input type="text" class="form-control" id="surgeon_name" name="surgeon_name" value="{{ patient.surgeon_name or '' }}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="incision_type" class="form-label">Incision Type</label>
                            <select class="form-select" id="incision_type" name="incision_type">
                                <option value="">Select Incision Type</option>
                                <option value="Pfannenstiel" {% if patient.incision_type == 'Pfannenstiel' %}selected{% endif %}>Pfannenstiel</option>
                                <option value="Classical" {% if patient.incision_type == 'Classical' %}selected{% endif %}>Classical</option>
                                <option value="Vertical" {% if patient.incision_type == 'Vertical' %}selected{% endif %}>Vertical</option>
                                <option value="T-incision" {% if patient.incision_type == 'T-incision' %}selected{% endif %}>T-incision</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="discharge_date" class="form-label">Discharge Date</label>
                            <input type="datetime-local" class="form-control" id="discharge_date" name="discharge_date" 
                                   value="{% if patient.discharge_date %}{{ patient.discharge_date.strftime('%Y-%m-%dT%H:%M') }}{% endif %}">
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Update Patient
                        </button>
                        <a href="{{ url_for('patients.view_patient', patient_id=patient.id) }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
