{% extends "base.html" %}

{% block title %}Create Follow-up - Post-Cesarean Wound Care System{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-calendar-plus"></i> Schedule Follow-up - {{ patient.get_full_name() }}</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('follow_ups.create_follow_up', patient_id=patient.id) }}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="follow_up_date" class="form-label">Follow-up Date *</label>
                            <input type="date" class="form-control" id="follow_up_date" name="follow_up_date" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="follow_up_time" class="form-label">Time *</label>
                            <input type="time" class="form-control" id="follow_up_time" name="follow_up_time" value="09:00" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="follow_up_type" class="form-label">Follow-up Type *</label>
                            <select class="form-select" id="follow_up_type" name="follow_up_type" required>
                                <option value="">Select Type</option>
                                <option value="In-person">In-person</option>
                                <option value="Telemedicine">Telemedicine</option>
                                <option value="Phone">Phone</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="visit_location" class="form-label">Visit Location</label>
                            <input type="text" class="form-control" id="visit_location" name="visit_location" placeholder="e.g., OPD, Home">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="4" placeholder="Additional notes for this follow-up..."></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Schedule Follow-up
                        </button>
                        <a href="{{ url_for('patients.view_patient', patient_id=patient.id) }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
