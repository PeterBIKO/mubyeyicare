services:
  - type: web
    name: mubyeyicare
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        value: ""
      - key: SECRET_KEY
        value: ""
