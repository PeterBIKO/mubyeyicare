{% extends "base.html" %}
{% block title %}Edit User - MubyeyiCare{% endblock %}

{% block content %}
<div class="page-header" data-aos="fade-down">
    <h2><i class="fas fa-user-pen me-2"></i> Edit User: {{ user.get_full_name() }}</h2>
    <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> Back</a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7" data-aos="fade-up">
        <div class="card mb-3">
            <div class="card-header bg-primary text-white"><i class="fas fa-pen me-2"></i> Update Details</div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('admin.edit_user', user_id=user.id) }}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" name="first_name" value="{{ user.first_name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" name="last_name" value="{{ user.last_name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" value="{{ user.email }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" name="phone" value="{{ user.phone or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Role</label>
                            <select class="form-select" name="role">
                                {% for r in roles %}
                                <option value="{{ r.value }}" {{ 'selected' if user.role == r }}>{{ r.value.capitalize() }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Location <small class="text-muted">(CHW area)</small></label>
                            <input type="text" class="form-control" name="location" value="{{ user.location or '' }}" placeholder="e.g. Gasabo/Kinyinya">
                        </div>
                    </div>
                    <hr class="my-3">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i> Save Changes</button>
                        <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Reset Password -->
        <div class="card">
            <div class="card-header bg-warning text-dark"><i class="fas fa-key me-2"></i> Reset Password</div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('admin.reset_password', user_id=user.id) }}">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-8">
                            <label class="form-label">New Password <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" name="new_password" minlength="6" required placeholder="Min. 6 characters">
                        </div>
                        <div class="col-md-4">
                            <button type="submit" class="btn btn-warning w-100"
                                    onclick="return confirm('Reset password for {{ user.username }}?')">
                                <i class="fas fa-rotate me-1"></i> Reset
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
