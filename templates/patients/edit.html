{% extends "base.html" %}

{% block title %}Edit Patient - MubyeyiCare{% endblock %}

{% block content %}
<div class="page-header" data-aos="fade-down">
    <h2><i class="fas fa-pen-to-square"></i> Edit Patient</h2>
    <a href="{{ url_for('patients.view_patient', patient_id=patient.id) }}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left me-1"></i> Back to Patient
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-9" data-aos="fade-up">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <i class="fas fa-user-pen me-2"></i> {{ patient.get_full_name() }}
                <small class="text-white-50 ms-2">&mdash; {{ patient.mrn }}</small>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('patients.edit_patient', patient_id=patient.id) }}">

                    <p class="section-title">Personal Information</p>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">First Name <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" id="first_name" name="first_name"
                                       value="{{ patient.first_name }}" required>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">Last Name <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" id="last_name" name="last_name"
                                       value="{{ patient.last_name }}" required>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                <input type="tel" class="form-control" id="phone" name="phone"
                                       value="{{ patient.phone }}" required>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email"
                                       value="{{ patient.email or '' }}">
                            </div>
                        </div>
                    </div>

                    <hr class="my-3">
                    <p class="section-title">Surgery Information</p>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="surgery_type" class="form-label">Surgery Type</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-notes-medical"></i></span>
                                <input type="text" class="form-control" id="surgery_type" name="surgery_type"
                                       value="{{ patient.surgery_type or '' }}">
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="surgeon_name" class="form-label">Surgeon Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user-doctor"></i></span>
                                <input type="text" class="form-control" id="surgeon_name" name="surgeon_name"
                                       value="{{ patient.surgeon_name or '' }}">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="incision_type" class="form-label">Incision Type</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-cut"></i></span>
                                <select class="form-select" id="incision_type" name="incision_type" style="border-left:none;">
                                    <option value="">— Select Incision Type —</option>
                                    <option value="Pfannenstiel" {% if patient.incision_type == 'Pfannenstiel' %}selected{% endif %}>Pfannenstiel</option>
                                    <option value="Classical"    {% if patient.incision_type == 'Classical'    %}selected{% endif %}>Classical</option>
                                    <option value="Vertical"     {% if patient.incision_type == 'Vertical'     %}selected{% endif %}>Vertical</option>
                                    <option value="T-incision"   {% if patient.incision_type == 'T-incision'   %}selected{% endif %}>T-incision</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="discharge_date" class="form-label">Discharge Date</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-calendar-check"></i></span>
                                <input type="datetime-local" class="form-control" id="discharge_date" name="discharge_date"
                                       value="{% if patient.discharge_date %}{{ patient.discharge_date.strftime('%Y-%m-%dT%H:%M') }}{% endif %}">
                            </div>
                        </div>
                    </div>

                    <hr class="my-3">
                    <p class="section-title">Location</p>
                    <div class="mb-3">
                        <label for="location" class="form-label">
                            Patient Location
                            <small class="text-muted fw-normal ms-1">— used to assign community health workers</small>
                        </label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-location-dot"></i></span>
                            <input type="text" class="form-control" id="location" name="location"
                                   value="{{ patient.location or '' }}"
                                   placeholder="e.g. Gasabo / Kinyinya">
                        </div>
                    </div>

                    <hr class="my-3">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="fas fa-save me-1"></i> Save Changes
                        </button>
                        <a href="{{ url_for('patients.view_patient', patient_id=patient.id) }}" class="btn btn-outline-secondary">
                            <i class="fas fa-times me-1"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
